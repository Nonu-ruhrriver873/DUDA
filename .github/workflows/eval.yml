name: DUDA Eval Validation

on:
  pull_request:
    paths:
      - 'SKILL.md'
      - 'scripts/**'
      - 'references/**'
      - 'evals/**'
      - 'hooks/**'
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate Python scripts compile
        run: |
          for script in scripts/*.py; do
            echo "Checking $script..."
            python -m py_compile "$script"
          done

      - name: Check for Korean text in user-facing files
        run: |
          echo "Checking for Korean characters in user-facing files..."
          # Korean Unicode range: AC00-D7AF (Hangul syllables)
          if grep -Prn '[\xAC\x00-\xD7\xAF]' SKILL.md README.md references/patterns.md hooks/duda-hook.js 2>/dev/null; then
            echo "::error::Korean text found in user-facing files. All content must be in English."
            exit 1
          fi
          echo "✅ No Korean text found"

      - name: Validate evals.json structure
        run: |
          python -c "
          import json
          with open('evals/evals.json') as f:
              data = json.load(f)
          assert 'evals' in data, 'Missing evals key'
          assert len(data['evals']) >= 8, f'Need at least 8 evals, found {len(data[\"evals\"])}'
          for tc in data['evals']:
              assert 'id' in tc, f'TC missing id'
              assert 'prompt' in tc, f'TC {tc[\"id\"]} missing prompt'
              assert 'expectations' in tc, f'TC {tc[\"id\"]} missing expectations'
              assert len(tc['expectations']) >= 3, f'TC {tc[\"id\"]} needs 3+ expectations'
          print(f'✅ {len(data[\"evals\"])} eval test cases validated')
          "

      - name: Validate hook detection
        run: |
          node -e "
          const { detectMode } = require('./hooks/duda-hook.js');
          const tests = [
            { prompt: 'duda init', expectedMode: 'init' },
            { prompt: 'migrate the login from platform to tenant', expectedMode: 'transplant' },
            { prompt: 'tenant is showing other company data', expectedMode: 'audit' },
            { prompt: 'duda scan src/components/Form.tsx', expectedMode: 'scan' },
            { prompt: 'what is the weather today', expectedMode: null },
          ];
          let passed = 0;
          for (const t of tests) {
            const result = detectMode(t.prompt);
            if (result.mode === t.expectedMode) {
              passed++;
            } else {
              console.error('FAIL:', t.prompt, '→ expected', t.expectedMode, 'got', result.mode);
            }
          }
          console.log(passed + '/' + tests.length + ' hook detection tests passed');
          if (passed < tests.length) process.exit(1);
          "
